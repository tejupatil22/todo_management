<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | TaskFlow Pro</title>

<style>


body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");

    background-size:cover;
    background-position:center;
}

/* Login Box */
.container{
    width:360px;
    padding:35px;
    border-radius:18px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);

    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    color:white;
    text-align:center;
}

/* Title */
h2{
    margin-bottom:25px;
    font-size:28px;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:15px;
}


button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;

    background:#00f2fe;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4facfe;
    transform:scale(1.05);
}

/* Links */
p{
    margin-top:15px;
    font-size:14px;
}

a{
    color:#00f2fe;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    color:yellow;
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <h2>Login to TaskFlow</h2>

    <form action="login" method="post">

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">Login</button>

    </form>

    <p>
        Don't have an account?
        <a href="register.html">Register Here</a>
    </p>

</div>

</body>
</html>

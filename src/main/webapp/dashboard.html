<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Todo System</title>

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* ================= BODY ================= */
body{
    height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1506784365847-bbad939e9335");

    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    color:white;
}

/* ================= NAVBAR ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.logo{
    font-size:28px;
    font-weight:bold;
    font-style:italic;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
    transition:0.3s;
}

.navbar a:hover{
    color:#00f2fe;
}

/* ================= CONTAINER ================= */
.container{
    flex:1;
    width:90%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= CARD ================= */
.card{
    width:80%;
    padding:40px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);

    border-radius:20px;

    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

/* ================= HEADING ================= */
h2{
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
}

/* ================= FORM ================= */
.form-row{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

/* ================= INPUT ================= */
input,select{
    padding:12px;
    width:220px;

    border:none;
    border-radius:8px;

    outline:none;
}

/* ================= BUTTON ================= */
.btn{
    padding:12px 18px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    font-weight:bold;
    text-decoration:none;

    display:inline-block;

    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* ================= COLORS ================= */
.add{
    background:#00f2fe;
    color:black;
}

.view{
    background:orange;
    color:white;
}

/* ================= FOOTER ================= */
footer{
    text-align:center;
    padding:15px;
    background: rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">Todo System</div>

    <div>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="logout">Logout</a>
    </div>

</div>

<!-- MAIN -->
<div class="container">

<div class="card">

    <h2>Task Dashboard</h2>

    <!-- ADD TASK FORM -->
    <form action="addTask" method="post">

        <div class="form-row">

            <input type="text"
                   name="title"
                   placeholder="Task Title"
                   required>

            <input type="text"
                   name="description"
                   placeholder="Description"
                   required>

            <input type="date"
                   name="deadline"
                   required>

            <select name="priority">

                <option>High</option>
                <option>Medium</option>
                <option>Low</option>

            </select>

            <select name="status">

                <option>Pending</option>
                <option>In Progress</option>
                <option>Completed</option>

            </select>

            <!-- ADD BUTTON -->
            <button class="btn add" type="submit">
                Add Task
            </button>

            <!-- VIEW BUTTON -->
            <a href="viewTask" class="btn view">
                View Tasks
            </a>

        </div>

    </form>

</div>

</div>

<!-- FOOTER -->
<footer>
    © 2026 Todo Management System | Organize. Track. Complete.
</footer>

</body>
</html>

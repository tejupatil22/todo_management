<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Todo System</title>

<style>

/* ================= BASE ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* ================= BACKGROUND (MATCH INDEX) ================= */
body{
    height:100vh;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1506784365847-bbad939e9335");

    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    color:white;
}

/* ================= NAVBAR ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.logo{
    font-size:28px;
    font-weight:bold;
    font-style:italic;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:18px;
    transition:0.3s;
}

.navbar a:hover{
    color:#00f2fe;
}

/* ================= CONTAINER ================= */
.container{
    flex:1;
    width:90%;
    margin:auto;
    margin-top:20px;
}

/* ================= GLASS CARD ================= */
.card{
	margin-top:50px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

/* ================= INPUTS ================= */
input,select{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* ================= BUTTONS ================= */
.btn{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin:5px;
    text-decoration:none;
    display:inline-block;
    transition:0.3s;
}

/* COLORS */
.add{ background:#00f2fe; color:black; }
.update{ background:blue; color:white; }
.delete{ background:red; color:white; }
.view{ background:orange; color:white; }

/* HOVER */
.btn:hover{
    transform:scale(1.05);
}

/* ================= VIEW BUTTON BAR ================= */
.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:15px;
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin-top:20px;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.3);
}

th{
    background: rgba(0,0,0,0.4);
}

/* ================= FOOTER ================= */
footer{
    text-align:center;
    padding:15px;
    background: rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">Todo System</div>

    <div>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="logout">Logout</a>
    </div>

</div>

<!-- MAIN -->
<div class="container">

<div class="card">

    <h2>Task Dashboard</h2>

    <!-- ADD TASK FORM -->
    <form action="addTask" method="post">

        <input type="text" name="title" placeholder="Task Title">
        <input type="text" name="description" placeholder="Description">
        <input type="date" name="deadline">

        <select name="priority">
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
        </select>

        <select name="status">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
        </select>

        <button class="btn add" type="submit">Add Task</button>

    </form>

    <!-- VIEW BUTTON FIXED TOP RIGHT -->
    <div class="top-bar">
        <a href="viewTask" class="btn view">View Tasks</a>
    </div>

    <!-- TABLE -->
    <table>

        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Deadline</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr>
            <td>Java Project</td>
            <td>Servlet CRUD</td>
            <td>2026-01-15</td>
            <td>High</td>
            <td>Pending</td>
            <td>
                <a href="updateTask?taskId=1" class="btn update">Update</a>
                <a href="deleteTask?taskId=1" class="btn delete">Delete</a>
            </td>
        </tr>

    </table>

</div>

</div>

<!-- FOOTER -->
<footer>
    © 2026 Todo Management System | Organize. Track. Complete.
</footer>

</body>
</html>

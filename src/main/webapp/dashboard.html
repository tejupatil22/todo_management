<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Todo System</title>

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

/* ================= BODY ================= */
body{
    min-height:100vh;
    display:flex;
    flex-direction:column;

    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("https://images.unsplash.com/photo-1506784365847-bbad939e9335");

    background-size:cover;
    background-position:center;
    color:white;
}

/* ================= NAVBAR ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
    font-style:italic;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
    transition:0.3s;
}

.navbar a:hover{
    color:#00f2fe;
}

/* ================= MAIN CENTER ================= */
.wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* ================= CARD ================= */
.card{
    width:90%;
    max-width:950px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);

    padding:35px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* ================= TITLE ================= */
h2{
    text-align:center;
    margin-bottom:20px;
}

/* ================= TOP BAR ================= */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:10px;
}

/* SEARCH */
.search-form{
    display:flex;
    gap:10px;
}

.search-form input{
    padding:10px;
    width:220px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* ================= INPUT ROW ================= */
.form-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
}

/* INPUT */
input,select{
    padding:10px;
    width:180px;
    border:none;
    border-radius:8px;
    outline:none;
}

/* ================= BUTTON ================= */
.btn{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* COLORS */
.add{
    background:#00f2fe;
    color:black;
}

.view{
    background:#ff9800;
    color:white;
}

.search{
    background:#ffd000;
    color:black;
}

/* ================= FOOTER FIXED BOTTOM ================= */
footer{
    text-align:center;
    padding:12px;
    background: rgba(0,0,0,0.5);
}

/* ================= RESPONSIVE ================= */
@media(max-width:700px){
    .top-bar{
        flex-direction:column;
        align-items:center;
    }

    .search-form input{
        width:180px;
    }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Todo System</div>

    <div>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="logout">Logout</a>
    </div>
</div>

<!-- CENTER CONTENT -->
<div class="wrapper">

<div class="card">

    <h2>Task Dashboard</h2>

    <!-- TOP ACTION BAR -->
    <div class="top-bar">

        <!-- SEARCH -->
        <form action="searchTask" method="get" class="search-form">

            <input type="text" name="keyword" placeholder="Search task...">

            <button class="btn search" type="submit">Search</button>

        </form>

        <!-- VIEW -->
        <a href="viewTask">
            <button class="btn view">View Tasks</button>
        </a>

    </div>

    <!-- ADD TASK -->
    <form action="addTask" method="post">

        <div class="form-row">

            <input type="text" name="title" placeholder="Task Title" required>

            <input type="text" name="description" placeholder="Description" required>

            <input type="date" name="deadline" required>

            <select name="priority">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

            <select name="status">
                <option>Pending</option>
                <option>In Progress</option>
                <option>Completed</option>
            </select>

            <button class="btn add" type="submit">Add Task</button>

        </div>

    </form>

</div>

</div>

<!-- FOOTER (BOTTOM) -->
<footer>
    © 2026 Todo Management System | Organize • Track • Complete
</footer>

</body>
</html>

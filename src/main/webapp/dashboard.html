<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dashboard | Todo System</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

/* BODY */
body{
    min-height:100vh;
    display:flex;
    flex-direction:column;

    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url("https://images.unsplash.com/photo-1506784365847-bbad939e9335");

    background-size:cover;
    background-position:center;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 50px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:30px;
    font-weight:bold;
    font-style:italic;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
    transition:0.3s;
}

.navbar a:hover{
    color:#00f2fe;
}

/* WRAPPER */
.wrapper{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* CARD */
.card{
    width:95%;
    max-width:1100px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    padding:40px;
    border-radius:22px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* TITLE */
h2{
    text-align:center;
    font-size:40px;
    margin-bottom:35px;
}

/* TOP BAR FIX */
.top-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:35px;
}

/* BUTTON CONTAINER */
.action-buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    flex-wrap:wrap;
}

/* BUTTON STYLE */
.btn{
    padding:13px 22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    transform:translateY(-2px);
}

/* COLORS */
.view{background:#ff9800;color:white;}
.stats{background:#7c4dff;color:white;}
.filter{background:#00c853;color:white;}
.add{background:#00f2fe;color:black;}

/* FORM */
.form-row{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    justify-content:center;
}

.form-row input,
.form-row select{
    width:210px;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* FOOTER */
footer{
    text-align:center;
    padding:14px;
    background:rgba(0,0,0,0.4);
    font-size:15px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">Todo System</div>

    <div>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="logout">Logout</a>
    </div>

</div>

<!-- MAIN -->
<div class="wrapper">

<div class="card">

    <h2>Task Dashboard</h2>

    <!-- BUTTONS (CENTERED CLEAN UI) -->
    <div class="top-bar">

        <div class="action-buttons">

            <a href="viewTask" class="btn view">View Tasks</a>

            <a href="dashboard" class="btn stats">Dashboard Statistics</a>

            <a href="filter.html" class="btn filter">Filter Tasks</a>

        </div>

    </div>

    <!-- ADD TASK -->
    <form action="addTask" method="post">

        <div class="form-row">

            <input type="text" name="title" placeholder="Task Title" required>
            <input type="text" name="description" placeholder="Description" required>
            <input type="date" name="deadline" required>

            <select name="priority">
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>

            <select name="status">
                <option>Pending</option>
                <option>In Progress</option>
                <option>Completed</option>
            </select>

            <button class="btn add" type="submit">Add Task</button>

        </div>

    </form>

</div>

</div>

<footer>
© 2026 Todo Management System | Organize • Track • Complete
</footer>

</body>
</html>
